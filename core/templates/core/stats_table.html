<table class="table table-hover mb-0">
    <thead class="table-light border-bottom">
        <tr>
            <th class="ps-4 py-3">Staff Name</th>
            <th class="text-center py-3">Orders Picked</th>
            <th class="text-center py-3">Total Lines Prepared</th>
            <th class="text-center pe-4 py-3">Avg Lines / Order</th>
        </tr>
    </thead>
    <tbody>
        {% for staff in dataset.table %}
        <tr>
            <td class="fw-bold ps-4 py-3 align-middle">{{ staff.prepared_by }}</td>
            <td class="text-center py-3 align-middle">{{ staff.total_orders }}</td>
            <td class="text-center py-3 align-middle"><span class="badge bg-primary fs-6">{{ staff.total_lines }}</span></td>
            <td class="text-center text-muted pe-4 py-3 align-middle">{{ staff.avg_lines }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-2 d-block mb-2 text-secondary"></i>
                No performance data recorded in this folder yet.
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
