{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-box-seam me-2"></i>Inbound Containers</h2>
    <a href="{% url 'add_container' %}" class="btn btn-primary shadow-sm fw-bold">
        <i class="bi bi-camera-fill me-2"></i>New Container
    </a>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for c in containers %}
    <div class="col">
        <a href="{% url 'container_detail' c.pk %}" class="text-decoration-none">
            <div class="card shadow-sm h-100 border-0 truck-card">
                <div class="card-body text-center py-5">
                    <i class="bi bi-truck display-4 text-primary mb-3"></i>
                    <h4 class="fw-bold text-dark">{{ c.container_number }}</h4>
                    <p class="text-muted small mb-0">Received: {{ c.date_received|date:"M j, Y - g:i A" }}</p>
                    <span class="badge bg-secondary mt-2">{{ c.photos.count }} Photos</span>
                </div>
            </div>
        </a>
    </div>
    {% empty %}
    <div class="col-12 text-center py-5 text-muted">
        <h3>No containers logged yet.</h3>
    </div>
    {% endfor %}
</div>
{% endblock %}
