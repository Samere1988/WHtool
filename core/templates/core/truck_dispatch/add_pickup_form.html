{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white py-3">
                <h4 class="mb-0 fw-bold"><i class="bi bi-arrow-down-circle me-2"></i>Pickup/Redirect: {{ vendor.name }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="row mb-4">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">PO Number(s)</label>
                            <input type="text" name="po_numbers" class="form-control form-control-lg border-success" placeholder="PO#" required>
                        </div>
                    </div>

                    <h5 class="fw-bold mb-3 border-bottom pb-2 text-success">1. Pickup From</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-12">
                            <label class="form-label">Street Address</label>
                            <input type="text" name="address" class="form-control" value="{{ vendor.address }}">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">City</label>
                            <input type="text" name="city" class="form-control" value="{{ vendor.city }}">
                        </div>
                        <div class="col-md-7">
                            <label class="form-label">Truck / Region (Assigned Truck)</label>
                            <select name="region" class="form-select border-success shadow-sm">
                                {% for r in regions %}
                                    <option value="{{ r }}" {% if vendor.region == r %}selected{% endif %}>{{ r }}</option>
                                 {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="form-check form-switch mb-4 p-3 bg-light rounded border">
                        <input class="form-check-input ms-0 me-2" type="checkbox" name="is_redirect" id="redirectToggle">
                        <label class="form-check-label fw-bold text-primary" for="redirectToggle">
                            <i class="bi bi-truck me-1"></i> Delivering to a second location? (Redirect)
                        </label>
                    </div>

                    <div id="deliverySection" style="display: none;">
                        <h5 class="fw-bold mb-3 border-bottom pb-2 text-primary">2. Deliver To</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-12">
                                <label class="form-label">Destination Company Name</label>
                                <input type="text" name="dest_name" class="form-control border-primary" placeholder="e.g. ABC Logistics">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label">Destination City</label>
                                <input type="text" name="dest_city" class="form-control border-primary" placeholder="City">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Postal Code</label>
                                <input type="text" name="dest_postal" class="form-control border-primary" placeholder="A1B 2C3">
                            </div>
                        </div>
                    </div>

                    <h5 class="fw-bold mb-3 border-bottom pb-2">Load Details</h5>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Weight</label>
                            <input type="number" name="weight" class="form-control" min="0" placeholder="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Skids</label>
                            <input type="number" name="skids" class="form-control" min="0" placeholder="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Bundles</label>
                            <input type="number" name="bundles" class="form-control" min="0" placeholder="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Coils</label>
                            <input type="number" name="coils" class="form-control" min="0" placeholder="0">
                        </div>
                    </div>

                    <div class="mt-5 d-flex gap-3">
                        <button type="submit" class="btn btn-success btn-lg flex-grow-1 fw-bold shadow-sm">
                            SAVE STOP
                        </button>
                        <a href="{% url 'run_sheet' %}" class="btn btn-outline-secondary btn-lg fw-bold">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Show/Hide Redirect Logic
    document.getElementById('redirectToggle').addEventListener('change', function() {
        const section = document.getElementById('deliverySection');
        section.style.display = this.checked ? 'block' : 'none';

        // Set required fields for the destination if toggled on
        const destName = document.querySelector('input[name="dest_name"]');
        const destCity = document.querySelector('input[name="dest_city"]');

        destName.required = this.checked;
        destCity.required = this.checked;
    });
</script>
{% endblock %}
