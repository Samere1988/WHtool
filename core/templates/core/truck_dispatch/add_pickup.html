{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white py-3">
                <h4 class="mb-0 fw-bold"><i class="bi bi-arrow-down-circle me-2"></i>New Pickup Stop</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12 mb-3">
                            <label class="form-label fw-bold">Vendor Name</label>
                            <input type="text" name="vendor_name" list="vendor-list" class="form-control" placeholder="Type or select a vendor..." required>
                            <datalist id="vendor-list">
                                {% for v in vendors %}<option value="{{ v.name }}">{% endfor %}
                            </datalist>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">PO Number(s)</label>
                            <input type="text" name="po_numbers" class="form-control" placeholder="e.g. PO998, PO999" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Truck / Region</label>
                            <select name="region" class="form-select" required>
                                {% for r in regions %}<option value="{{ r }}">{{ r }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Pickup Address</label>
                            <input type="text" name="address" class="form-control" placeholder="Full Street Address">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold">City</label>
                            <input type="text" name="city" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <div class="form-check mt-4">
                                <input class="form-check-input" type="checkbox" name="save_vendor" id="saveVendor">
                                <label class="form-check-label fw-bold" for="saveVendor">Save to Vendor DB</label>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg fw-bold">ADD PICKUP TO SHEET</button>
                        <a href="{% url 'run_sheet' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
