{% extends "base.html" %}

{% block content %}
<h2 class="fw-bold mb-4">Select Customer for Run Sheet</h2>
<input type="text" id="customerSearch" class="form-control mb-4 shadow-sm" placeholder="Search Customer Name or City...">

<div class="card shadow-sm border-0">
    <table class="table table-hover align-middle mb-0" id="customerTable">
        <thead class="table-dark">
            <tr>
                <th>Customer Name</th>
                <th>City</th>
                <th>Region</th>
                <th class="text-end">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for c in customers %}
            <tr>
                <td class="fw-bold">{{ c.customer_name }}</td>
                <td>{{ c.city }}</td>
                <td><span class="badge bg-secondary">{{ c.region }}</span></td>
                <td class="text-end">
                    <a href="{% url 'entry_form' c.customer_id %}" class="btn btn-primary btn-sm">
                        ADD TO RUN <i class="bi bi-chevron-right ms-1"></i>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
    document.getElementById('customerSearch').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#customerTable tbody tr');
        rows.forEach(row => {
            let text = row.textContent.toLowerCase();
            row.style.display = text.includes(filter) ? '' : 'none';
        });
    });
</script>
{% endblock %}
