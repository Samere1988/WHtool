{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white py-3">
                <h4 class="mb-0 fw-bold">{{ title }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">Customer ID (Code)</label>
                            <input type="text" name="customer_id" class="form-control" value="{{ customer.customer_id|default:'' }}" required>
                        </div>
                        <div class="col-md-7 mb-3">
                            <label class="form-label fw-bold">Customer Name</label>
                            <input type="text" name="customer_name" class="form-control" value="{{ customer.customer_name|default:'' }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Street Address</label>
                        <input type="text" name="address" class="form-control" value="{{ customer.address|default:'' }}">
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">City</label>
                            <input type="text" name="city" class="form-control" value="{{ customer.city|default:'' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Postal Code</label>
                            <input type="text" name="postal_code" class="form-control" value="{{ customer.postal_code|default:'' }}" placeholder="e.g. H0H 0H0">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label fw-bold">Region</label>
                            <select name="region" class="form-select">
                                <option value="">Select Truck...</option>
                                {% for r in regions %}
                                <option value="{{ r }}" {% if customer.region == r %}selected{% endif %}>{{ r }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-grow-1 fw-bold py-2">
                            <i class="bi bi-check-circle me-2"></i>SAVE CUSTOMER DATA
                        </button>
                        <a href="{% url 'manage_customers' %}" class="btn btn-outline-secondary py-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
