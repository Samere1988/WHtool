{% extends "base.html" %}
{% block content %}
<h2 class="fw-bold mb-4" style="color: #6610f2;"><i class="bi bi-person-badge me-2"></i>Select Customer for Counter Pickup</h2>
<input type="text" id="customerSearch" class="form-control mb-4 shadow-sm" placeholder="Search Customer Name or City...">

<div class="card shadow-sm border-0">
    <table class="table table-hover align-middle mb-0" id="customerTable">
        <thead class="table-dark" style="background-color: #6610f2;">
            <tr>
                <th>Customer Name</th>
                <th>City</th>
                <th class="text-end">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for c in customers %}
            <tr>
                <td class="fw-bold">{{ c.customer_name }}</td>
                <td>{{ c.city }}</td>
                <td class="text-end">
                    <a href="{% url 'add_pickup_order' c.customer_id %}" class="btn btn-sm text-white" style="background-color: #6610f2;">
                        SELECT <i class="bi bi-chevron-right ms-1"></i>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
    document.getElementById('customerSearch').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#customerTable tbody tr');
        rows.forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(filter) ? '' : 'none';
        });
    });
</script>
{% endblock %}
