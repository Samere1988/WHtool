{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold mb-0"><i class="bi bi-folder2-open me-2 text-indigo"></i>Customer Pickup / Other Log</h2>
        <p class="text-muted">Orders picked up at the counter or handled outside of truck runs.</p>
    </div>
    <a href="{% url 'select_customer_pickup' %}" class="btn btn-indigo btn-lg fw-bold shadow-sm text-white" style="background-color: #6610f2;">
        <i class="bi bi-plus-circle me-2"></i>LOG NEW PICKUP
    </a>
</div>

<div class="row g-3">
    {% for date in dates %}
    <div class="col-md-3">
        <a href="{% url 'daily_pickup_detail' date|date:'Y-m-d' %}" class="text-decoration-none">
            <div class="card shadow-sm border-0 h-100 folder-card">
                <div class="card-body text-center py-4">
                    <i class="bi bi-folder-fill display-4 text-warning mb-2"></i>
                    <h5 class="fw-bold text-dark mb-1">{{ date|date:"F d, Y" }}</h5>
                    <span class="badge bg-light text-muted border">View Daily Records</span>
                </div>
            </div>
        </a>
    </div>
    {% empty %}
    <div class="col-12 text-center py-5">
        <i class="bi bi-inbox text-muted display-1"></i>
        <p class="text-muted mt-3">No pickup records found yet.</p>
    </div>
    {% endfor %}
</div>

<style>
    .folder-card { transition: transform 0.2s; }
    .folder-card:hover { transform: scale(1.05); cursor: pointer; }
    .text-indigo { color: #6610f2; }
</style>
{% endblock %}
