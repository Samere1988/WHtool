{% extends "base.html" %}

{% block content %}
<div class="photos-home-page">
    <div class="row mb-4 mt-2">
        <div class="col">
            <h2 class="fw-bold photos-title">
                <i class="bi bi-camera-fill me-2"></i>Photos
            </h2>
            <p class="text-muted mb-0">Choose the type of photo log you want to open.</p>
        </div>
    </div>

    <div class="row g-4 photos-card-grid">
        <div class="col-12 col-sm-6 col-lg-4">
            <a href="{% url 'pickup_photo_list' %}" class="card photo-card p-4 shadow-sm border-0 h-100 text-center">
                <div class="photo-icon-box mx-auto mb-3" style="background-color: #6610f2; color: white;">
                    <i class="bi bi-person-badge"></i>
                </div>
                <h3 class="h5 fw-bold mb-2">Customer Pickup Photos</h3>
                <p class="text-muted small mb-0">Photos for customer pickup orders.</p>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
            <a href="{% url 'container_list' %}" class="card photo-card p-4 shadow-sm border-0 h-100 text-center">
                <div class="photo-icon-box bg-warning text-dark mx-auto mb-3">
                    <i class="bi bi-box-seam"></i>
                </div>
                <h3 class="h5 fw-bold mb-2">Container Photos</h3>
                <p class="text-muted small mb-0">Photos for received containers.</p>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
            <a href="{% url 'outbound_list' %}" class="card photo-card p-4 shadow-sm border-0 h-100 text-center">
                <div class="photo-icon-box bg-info text-white mx-auto mb-3">
                    <i class="bi bi-truck-flatbed"></i>
                </div>
                <h3 class="h5 fw-bold mb-2">Outbound Photos</h3>
                <p class="text-muted small mb-0">Photos for loaded outbound trucks.</p>
            </a>
        </div>
    </div>
</div>

<style>
    .photos-home-page {
        padding-bottom: 2rem;
    }

    .photos-title {
        font-size: 2rem;
    }

    .photo-card {
        text-decoration: none;
        color: inherit;
        transition: all 0.25s ease;
        border-radius: 18px;
        min-height: 210px;
    }

    .photo-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.12) !important;
        border: 1px solid #0d6efd !important;
    }

    .photo-card:hover h3 {
        color: #0d6efd;
    }

    .photo-icon-box {
        width: 80px;
        height: 80px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.3rem;
    }

    @media (max-width: 576px) {
        .photos-home-page {
            padding-left: 0.25rem;
            padding-right: 0.25rem;
        }

        .photos-title {
            font-size: 1.5rem;
        }

        .photos-card-grid {
            --bs-gutter-y: 1rem;
        }

        .photo-card {
            min-height: 155px;
            padding: 1.25rem !important;
            border-radius: 16px;
        }

        .photo-icon-box {
            width: 58px;
            height: 58px;
            font-size: 1.6rem;
            border-radius: 13px;
            margin-bottom: 0.75rem !important;
        }

        .photo-card h3 {
            font-size: 1rem;
        }

        .photo-card p {
            font-size: 0.8rem;
        }
    }
</style>
{% endblock %}
