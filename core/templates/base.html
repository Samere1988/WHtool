<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHTool.ca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .navbar-custom { background-color: #0d2c54; }
        .nav-link { color: rgba(255,255,255,0.85); transition: color 0.2s; }
        .nav-link:hover { color: #ffffff; }
        .nav-link.active { color: #ffffff !important; }

        /* Compact Run Sheet total summary styling */
        .row.g-3.mb-4:has(.daily-total-card) {
            max-width: 860px;
            margin-left: auto !important;
            margin-right: 0 !important;
            margin-top: 0.25rem !important;
            margin-bottom: 1.25rem !important;
            align-items: stretch;
        }

        .daily-total-card {
            position: relative !important;
            overflow: hidden !important;
            border: 1px solid rgba(13, 44, 84, 0.12) !important;
            border-radius: 0.85rem !important;
            padding: 0.65rem 0.85rem !important;
            min-height: 72px !important;
            color: #0f172a !important;
            background: #ffffff !important;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.10) !important;
        }

        .daily-total-card::after {
            content: "";
            position: absolute;
            right: -28px;
            top: -32px;
            width: 82px;
            height: 82px;
            border-radius: 999px;
            background: rgba(13, 110, 253, 0.08);
        }

        .daily-total-card .text-muted,
        .daily-total-card .small {
            color: #64748b !important;
            letter-spacing: .045em;
            font-size: .72rem !important;
            line-height: 1.05 !important;
            margin-bottom: .2rem !important;
        }

        .daily-total-value {
            color: #0d6efd !important;
            font-size: 1.45rem !important;
            font-weight: 950 !important;
            line-height: 1 !important;
            margin-top: .15rem !important;
            letter-spacing: -.035em !important;
        }

        .row.g-3.mb-4 > .col-md-3:nth-child(2) .daily-total-value { color: #198754 !important; }
        .row.g-3.mb-4 > .col-md-3:nth-child(3) .daily-total-value { color: #b45309 !important; }
        .row.g-3.mb-4 > .col-md-3:nth-child(4) .daily-total-value { color: #dc3545 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-box-seam me-2"></i>WHTOOL.CA
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    {# Top-right navbar links removed as requested #}
                </ul>
            </div>
        </div>
    </nav>

    <div class="{% block container_type %}container{% endblock %}">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
