<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHTool.ca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .navbar-custom { background-color: #0d2c54; }
        .nav-link { color: rgba(255,255,255,0.85); transition: color 0.2s; }
        .nav-link:hover { color: #ffffff; }
        .nav-link.active { color: #ffffff !important; }

        /* Run Sheet total summary styling */
        .daily-total-card {
            position: relative !important;
            overflow: hidden !important;
            border: 0 !important;
            border-radius: 1.25rem !important;
            padding: 1.1rem 1.25rem !important;
            min-height: 112px !important;
            color: #ffffff !important;
            background: linear-gradient(135deg, #0d2c54 0%, #174f91 100%) !important;
            box-shadow: 0 12px 28px rgba(13, 44, 84, 0.22) !important;
        }

        .daily-total-card::after {
            content: "";
            position: absolute;
            right: -34px;
            top: -34px;
            width: 115px;
            height: 115px;
            border-radius: 999px;
            background: rgba(255,255,255,0.11);
        }

        .daily-total-card .text-muted,
        .daily-total-card .small {
            color: rgba(255,255,255,0.78) !important;
            letter-spacing: .07em;
        }

        .daily-total-value {
            color: #ffffff !important;
            font-size: 2.35rem !important;
            font-weight: 950 !important;
            line-height: 1 !important;
            margin-top: .35rem !important;
            letter-spacing: -.04em !important;
        }

        .row.g-3.mb-4 > .col-md-3:nth-child(2) .daily-total-card {
            background: linear-gradient(135deg, #14532d 0%, #16a34a 100%) !important;
            box-shadow: 0 12px 28px rgba(20, 83, 45, 0.22) !important;
        }

        .row.g-3.mb-4 > .col-md-3:nth-child(3) .daily-total-card {
            background: linear-gradient(135deg, #92400e 0%, #f59e0b 100%) !important;
            box-shadow: 0 12px 28px rgba(146, 64, 14, 0.22) !important;
        }

        .row.g-3.mb-4 > .col-md-3:nth-child(4) .daily-total-card {
            background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%) !important;
            box-shadow: 0 12px 28px rgba(127, 29, 29, 0.22) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-box-seam me-2"></i>WHTOOL.CA
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    {# Top-right navbar links removed as requested #}
                </ul>
            </div>
        </div>
    </nav>

    <div class="{% block container_type %}container{% endblock %}">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
